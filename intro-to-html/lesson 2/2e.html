<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  .apply-button {
    background-color: rgb(10, 102, 194);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 18px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    margin-left: 8px;
    margin-right: 15px;
  }

  .save-button {
    background-color: white;
    color: rgb(29, 123, 177);
    border: 1px solid rgb(29, 123, 177);
    font-weight: bold;
    font-size: 15px;
    padding: 12px;
    padding-left:  20px;
    padding-right: 20px;
    border-radius: 20px;
    cursor: pointer;
}
</style>

<body>
  

<button class="apply-button">Apply on company website</button>

<button class="save-button">Save</button>

</body>
</html>
