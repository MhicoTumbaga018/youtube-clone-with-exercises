<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon</title>
  <style>
    .amazon-link {
      display: inline-block;
      padding: 10px 20px;
      background-color: #232f3e;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }

    .title {
      font-size: 30px;
      font-weight: bold;
      margin-top: 20px;

    }

    .price{
      font-size: 24 px;
      font-weight: bold;
      color: rgb(0, 118, 0);
      margin-top: 10px;}
    
      .add-button {
        background-color: rgb(255, 216, 20);
        color: black;
        border: none;
        padding: 12px 30px;
        border-radius: 16px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;


      }

      .buy-button {
        background-color: rgb(255, 164, 28);
        color: black;
        border: none;
        font-weight: bold;
        padding: 12px 30px;
        border-radius: 16px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
        margin-left: 13px;

      }

  </style>
</head>
<body>
  
 <a href="https://www.amazon.com" class="amazon-link">Back to Amazon</a>

 <p class="title">Nike Black Running Shoes</p>
  
 <p class="price">$39 - in stock.</p>

 <p>Free delivery tomorrow.</p>

 <button class="add-button">Add to Cart</button>

 <button class="buy-button">Buy Now</button>

   
</body>
</html>
