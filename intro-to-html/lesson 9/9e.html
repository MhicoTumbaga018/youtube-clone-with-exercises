<!doctype html>
<html>
  <head>
    <title>Twitter text box</title>
    <link rel="stylesheet" href="9e.css" />
  </head>
  <body>
    <div class="card">
      <img
        class="profile-picture"
        src="handsome-cat.jpg"
        alt="A handsome cat"
      />
      <input type="text" class="text-box" placeholder="What's happening?" />
      <button class="tweet-button">
        Tweet</button>
    </div>
  </body>
</html>
